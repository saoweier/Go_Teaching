# Project-specific KataGo GTP config for direct play or GUI attachment.

logDir = gtp_logs
logAllGTPCommunication = true
logSearchInfo = true
logSearchInfoForChosenMove = false
logToStderr = false
rules = tromp-taylor
ponderingEnabled = false
maxTimePondering = 60.0
maxVisits = 400
numSearchThreads = 6

# Use the NVIDIA OpenCL device discovered during local tuning.
openclDeviceToUse = 0
openclUseFP16 = auto

# Conservative defaults for a teaching product.
resignConsecTurns = 5
searchFactorWhenWinning = 0.60
searchFactorWhenWinningThreshold = 0.97
