# Project-specific KataGo analysis config for backend service use.
# Tuned for interactive single-user analysis on an RTX 5060 Laptop GPU via OpenCL.

logDir = analysis_logs
reportAnalysisWinratesAs = BLACK
maxVisits = 400

# This product mostly analyzes one position at a time, so latency matters more than throughput.
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 8
nnMaxBatchSize = 16
nnCacheSizePowerOfTwo = 21
nnMutexPoolSizePowerOfTwo = 16
nnRandomize = true

# Use the NVIDIA OpenCL device discovered during local tuning.
openclDeviceToUse = 0
openclUseFP16 = auto

# Helpful for analysis APIs so passing does not prematurely lock in cleanup assumptions.
conservativePass = true
preventCleanupPhase = true
